<!DOCTYPE html>

<html>
<head>
    <title>Animal Images API</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        #image-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        img {
            margin: 10px;
            border: 2px solid black;
            width: 200px;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h1>Animal Images (Using API & Async/Await)</h1>

<div id="image-container"></div>

<script>

// Async function to fetch animal images
async function fetchAnimals() {
    const container = document.getElementById("image-container");

    try {
        // Loop to get 10 images
        for (let i = 0; i < 10; i++) {

            // Using Dog API
            const response = await fetch("https://dog.ceo/api/breeds/image/random");
            const data = await response.json();

            const img = document.createElement("img");
            img.src = data.message; // image URL

            container.appendChild(img);
        }

    } catch (error) {
        console.log("Error:", error);
    }
}

// Call function
fetchAnimals();

</script>

</body>
</html>
